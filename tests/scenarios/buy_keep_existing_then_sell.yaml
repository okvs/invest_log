# 사용자 보고 시나리오 재현:
# "매수" 명령 → 기존 보유 종목 확인 → "그대로 유지" 클릭 → 매수 완료
# → "매도" 입력 시 매수대화가 취소되는 버그가 있었음

name: "매수 → 기존보유 그대로유지 → 매도 전환"
description: |
  매수 명령으로 기존 보유 종목을 추가매수하고 '그대로 유지' 버튼을 누른 뒤,
  매수 완료 후 매도 명령이 정상 동작하는지 확인. (매수 기록이 취소되면 안 됨)

setup:
  ticker_map:
    삼성전자: "005930.KS"
  holdings:
    - name: "삼성전자"
      ticker: "005930.KS"
      sector: "반도체"
      quantity: 10
      avg_price: 70000
      buy_thesis: "AI 수요 증가"

steps:
  # 1. 매수 명령
  - send: "매수"
    expect: "종목명 / 수량 / 매수가"

  # 2. 매수 정보 입력 → 기존 보유 종목이라 유지/수정 질문
  - send: |
      삼성전자
      10
      75000
    expect:
      - "기존 보유 종목입니다"
      - "그대로 유지하거나 수정할 항목을 선택해주세요"

  # 3. "그대로 유지" 버튼
  - click: "keep_existing"
    expect: "매수 기록 완료!"

  # 4. 매수 완료 직후 매도 명령 → sell 대화 시작되어야 함
  - send: "매도"
    expect: "매도할 종목을 선택해주세요"
    not_expect: "매수 기록이 취소되었습니다"
