# 테스트 시나리오 포맷
#
# 규칙:
#   send       — 사용자가 보낸 텍스트 메시지 (여러 줄은 | 사용)
#   click      — 인라인 버튼 클릭 (callback_data 값)
#   expect     — 응답에 포함되어야 할 문자열 (단일 문자열 또는 리스트)
#   not_expect — 응답에 포함되면 안 되는 문자열
#
# expect가 리스트면 "그 중 하나라도" 포함되면 통과
#
# 주요 callback_data 값:
#   keep_existing / edit_sector / edit_thesis  — 기존보유 확인
#   start_retro / skip_retro                    — 회고 시작/건너뛰기
#   sell_select:<종목명>                        — 매도 종목 선택
#   buy_stock:<종목명>|<코드>                   — 매수 종목 검색결과 선택

name: "broker 기존보유 추가매수 → 매수사유 수정 → 매도 → 회고 건너뛰기"
description: |
  증권사 체결 메시지로 기존 보유 종목을 추가매수하고, 매수사유를 수정한 뒤
  매수 완료 후 idle로 돌아와서 매도 명령이 정상 동작하는지 확인.

# 기존 보유 종목을 미리 세팅
setup:
  holdings:
    - name: "KODEX반도체레버리지"
      ticker: ""
      sector: "반도체"
      quantity: 100
      avg_price: 65000
      buy_thesis: "반도체 사이클 반등 기대"

steps:
  # 1. 증권사 체결 메시지 (기존 보유 종목 매수)
  - send: |
      [KB증권] 주식 체결 안내

      고객님, 주문하신 KODEX 반도체레버리지 주식이 체결됐으니 확인해주세요.

      ■ 계좌: *-*-*12 [01]
      ■ 종목명: KODEX 반도체레버리지
      ■ 주문수량: 120주
      ■ 체결금액: 67,365원
      ■ 내용: 매수체결(20374710)
    expect:
      - "기존 보유 종목입니다"
      - "그대로 유지하거나 수정할 항목을 선택해주세요"

  # 2. "매수사유 수정" 버튼 클릭
  - click: "edit_thesis"
    expect: "새로운 매수 근거를 입력해주세요"

  # 3. 새 매수 근거 입력 → 매수 완료
  - send: "레버리지 진입 타점"
    expect: "매수 기록 완료!"

  # 4. 매수 완료 후 매도 명령 → sell 대화로 진입되어야 함
  - send: "매도"
    expect: "매도할 종목을 선택해주세요"
    not_expect: "매수 기록이 취소되었습니다"

  # 5. 매도할 종목 선택 (버튼)
  - click: "sell_select:KODEX반도체레버리지"
    expect: "수량 / 매도가 / 사유"

  # 6. 매도 정보 입력
  - send: |
      50
      75000
      목표가 도달
    expect:
      - "매도 기록 완료!"
      - "이 매도에 대해 회고를 진행할까요?"

  # 7. "나중에" 버튼 (회고 건너뛰기)
  - click: "skip_retro"
    expect: "회고를 건너뛰었습니다"
